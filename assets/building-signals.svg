<svg width="520" height="220" viewBox="0 0 520 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Building signals</title>
  <desc id="desc">Building signals centered on Skillpkg, agent tools, public repositories, and study rhythm.</desc>
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="504" height="204" rx="22" fill="#f8fafc" stroke="#dcfce7" stroke-width="2"/>
  <text x="34" y="48" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="800">Building Signals</text>
  <g font-family="Inter, ui-sans-serif, system-ui">
    <text x="34" y="84" fill="#334155" font-size="14" font-weight="700">Skillpkg as the main project</text>
    <rect x="34" y="96" width="360" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="34" y="96" width="318" height="12" rx="6" fill="url(#bar)">
      <animate attributeName="width" values="220;340;318" dur="3s" repeatCount="indefinite"/>
    </rect>

    <text x="34" y="134" fill="#334155" font-size="14" font-weight="700">Agent tooling practice</text>
    <rect x="34" y="146" width="360" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="34" y="146" width="282" height="12" rx="6" fill="#16a34a">
      <animate attributeName="width" values="180;310;282" dur="3.4s" repeatCount="indefinite"/>
    </rect>

    <text x="34" y="184" fill="#334155" font-size="14" font-weight="700">Public notes and repos</text>
    <rect x="220" y="171" width="78" height="24" rx="12" fill="#eff6ff"/>
    <text x="237" y="188" fill="#2563eb" font-size="12" font-weight="800">public</text>
  </g>
  <g transform="translate(418 72)">
    <circle cx="34" cy="34" r="30" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <path d="M23 36l8 8 16-22" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
