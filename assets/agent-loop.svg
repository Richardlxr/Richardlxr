<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI agent workflow loop</title>
  <desc id="desc">Animated loop showing prompt, tools, feedback, and ship stages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eff6ff"/>
      <stop offset="0.48" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="line" x1="120" y1="140" x2="780" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.35" stop-color="#16a34a"/>
      <stop offset="0.7" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect x="12" y="12" width="876" height="256" rx="28" fill="url(#bg)" stroke="#dbeafe" stroke-width="2"/>

  <path id="motionPath" d="M140 142 C220 48 345 48 425 142 C505 236 640 236 760 142 C650 62 525 62 445 142 C365 222 230 222 140 142Z" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 14" opacity="0.78">
    <animate attributeName="stroke-dashoffset" from="0" to="-96" dur="4.8s" repeatCount="indefinite"/>
  </path>

  <circle r="9" fill="#2563eb">
    <animateMotion dur="5.2s" repeatCount="indefinite" path="M140 142 C220 48 345 48 425 142 C505 236 640 236 760 142 C650 62 525 62 445 142 C365 222 230 222 140 142Z"/>
    <animate attributeName="r" values="8;12;8" dur="1.3s" repeatCount="indefinite"/>
  </circle>
  <circle r="7" fill="#16a34a" opacity="0.9">
    <animateMotion dur="5.2s" begin="-1.7s" repeatCount="indefinite" path="M140 142 C220 48 345 48 425 142 C505 236 640 236 760 142 C650 62 525 62 445 142 C365 222 230 222 140 142Z"/>
  </circle>
  <circle r="7" fill="#f59e0b" opacity="0.9">
    <animateMotion dur="5.2s" begin="-3.4s" repeatCount="indefinite" path="M140 142 C220 48 345 48 425 142 C505 236 640 236 760 142 C650 62 525 62 445 142 C365 222 230 222 140 142Z"/>
  </circle>

  <g filter="url(#softShadow)">
    <rect x="74" y="103" width="132" height="76" rx="18" fill="white"/>
    <rect x="313" y="42" width="132" height="76" rx="18" fill="white"/>
    <rect x="454" y="162" width="132" height="76" rx="18" fill="white"/>
    <rect x="694" y="103" width="132" height="76" rx="18" fill="white"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" text-anchor="middle">
    <text x="140" y="133" fill="#1d4ed8" font-size="17" font-weight="700">Prompt</text>
    <text x="140" y="156" fill="#475569" font-size="13">intent + context</text>

    <text x="379" y="72" fill="#15803d" font-size="17" font-weight="700">Tools</text>
    <text x="379" y="95" fill="#475569" font-size="13">skills + code</text>

    <text x="520" y="192" fill="#b45309" font-size="17" font-weight="700">Feedback</text>
    <text x="520" y="215" fill="#475569" font-size="13">test + review</text>

    <text x="760" y="133" fill="#dc2626" font-size="17" font-weight="700">Ship</text>
    <text x="760" y="156" fill="#475569" font-size="13">public trace</text>
  </g>

  <text x="450" y="139" fill="#0f172a" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700" text-anchor="middle">agent-native learning loop</text>
  <text x="450" y="164" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" text-anchor="middle">learn, build, observe, reuse</text>
</svg>
