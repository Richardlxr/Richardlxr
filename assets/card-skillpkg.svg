<svg width="520" height="220" viewBox="0 0 520 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SKillpkg repository card</title>
  <desc id="desc">Featured repository card for Skillpkg, an AI agent tooling project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="520" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eff6ff"/>
      <stop offset="0.55" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="accent" x1="36" y1="36" x2="484" y2="184" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.45" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="504" height="204" rx="22" fill="url(#bg)" stroke="#dbeafe" stroke-width="2"/>
  <rect x="28" y="28" width="464" height="164" rx="18" fill="white" filter="url(#shadow)"/>
  <rect x="28" y="28" width="464" height="7" rx="3.5" fill="url(#accent)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="56" y="74" fill="#0f172a" font-size="28" font-weight="800">SKillpkg</text>
    <text x="56" y="104" fill="#334155" font-size="15">Vibe-coded AI-agent tooling project</text>
    <text x="56" y="134" fill="#64748b" font-size="14">skills, prompts, workflows, and reusable context</text>

    <g transform="translate(56 157)">
      <rect width="93" height="26" rx="13" fill="#eff6ff"/>
      <circle cx="18" cy="13" r="5" fill="#3178c6"/>
      <text x="31" y="18" fill="#1e40af" font-size="13" font-weight="700">TypeScript</text>
    </g>
    <g transform="translate(161 157)">
      <rect width="86" height="26" rx="13" fill="#f0fdf4"/>
      <text x="16" y="18" fill="#15803d" font-size="13" font-weight="700">AI Agents</text>
    </g>
    <g transform="translate(259 157)">
      <rect width="91" height="26" rx="13" fill="#fff7ed"/>
      <text x="16" y="18" fill="#b45309" font-size="13" font-weight="700">Skill Tools</text>
    </g>
  </g>

  <g transform="translate(400 62)">
    <circle cx="30" cy="30" r="28" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <path d="M18 32h24M30 20v24" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
    <circle cx="30" cy="30" r="7" fill="#16a34a">
      <animate attributeName="r" values="6;10;6" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.55;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
